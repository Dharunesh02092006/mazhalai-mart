<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mazhalai Mart - Products</title>
    <link rel="stylesheet" href="style.css?v=4">
    <link rel="stylesheet" href="products.css?v=4">
    <style>
        /* Force button colors - inline styles have highest priority */
        .add-to-cart-btn, button.add-to-cart-btn {
            background: #ff6b6b !important;
            background-color: #ff6b6b !important;
            color: white !important;
        }
        .add-to-cart-btn:hover, button.add-to-cart-btn:hover {
            background: #ee5a52 !important;
            background-color: #ee5a52 !important;
        }
        .btn-buy-now, button.btn-buy-now {
            background: #E6BE7A !important;
            background-color: #E6BE7A !important;
            color: #4B2E2B !important;
        }
        .btn-buy-now:hover, button.btn-buy-now:hover {
            background: #d4a95e !important;
            background-color: #d4a95e !important;
        }
    </style>
    <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
    <script src="js/user-cart.js"></script>
</head>
<body>
    <div class="header">
        <div class="header-brand">
            <h1>Mazhalai Mart</h1>
            <p>Safe & Soft Products for Your Little One</p>
        </div>
        <div class="nav">
            <a href="index.html">Home</a>
            <a href="products.html" class="active">Products</a>
            <a href="cart.html">Cart</a>
            <a href="orders.html">Orders</a>
        </div>
    </div>
    <section class="products container">
        <h2 class="section-title">Our Products</h2>
        <div id="loading-indicator" style="text-align: center; padding: 40px;">
            <p>Loading products...</p>
        </div>
        <div id="product-grid" class="product-grid">
            <!-- Products will be loaded dynamically here -->
        </div>
        <div id="error-message" style="display: none; text-align: center; color: #d32f2f; padding: 20px;">
            <p>Sorry, we couldn't load the products. Please try again later.</p>
        </div>
    </section>
    
    <div class="footer">
        <p></p>
    </div>
    
    <script src="js/user-cart.js"></script>
    
    <script>
        /**
         * Load products dynamically from API
         */
        function loadProducts(page = 1, search = '', category = '') {
            const productGrid = document.getElementById('product-grid');
            const loadingIndicator = document.getElementById('loading-indicator');
            const errorMessage = document.getElementById('error-message');
            
            // Show loading
            loadingIndicator.style.display = 'block';
            errorMessage.style.display = 'none';
            productGrid.innerHTML = '';
            
            // Build API URL
            let apiUrl = 'api/products.php?page=' + page;
            if (search) {
                apiUrl += '&search=' + encodeURIComponent(search);
            }
            if (category) {
                apiUrl += '&category=' + encodeURIComponent(category);
            }
            
            // Fetch products
            fetch(apiUrl)
                .then(response => {
                    if (!response.ok) throw new Error('API error');
                    return response.json();
                })
                .then(data => {
                    loadingIndicator.style.display = 'none';
                    
                    if (!data.success || !data.products || data.products.length === 0) {
                        errorMessage.innerHTML = '<p>No products available. Please check back later!</p>';
                        errorMessage.style.display = 'block';
                        return;
                    }
                    
                    // Render products
                    data.products.forEach(product => {
                        const productHTML = createProductCard(product);
                        productGrid.innerHTML += productHTML;
                    });
                    
                    // Reattach event listeners for new buttons
                    attachCartButtonListeners();
                })
                .catch(error => {
                    console.error('Error loading products:', error);
                    loadingIndicator.style.display = 'none';
                    errorMessage.style.display = 'block';
                });
        }
        
        /**
         * Create HTML for a product card
         */
        function createProductCard(product) {
            // Determine image source based on image_path
            let imageUrl = 'images/placeholder.jpg'; // Fallback
            
            if (product.image_path) {
                const imagePath = product.image_path.trim();
                
                // If image_path already starts with admin/ or images/, use it as-is
                if (imagePath.startsWith('admin/') || imagePath.startsWith('images/')) {
                    imageUrl = imagePath;
                }
                // If it starts with uploads/, it needs admin prefix (old format fix)
                else if (imagePath.startsWith('uploads/')) {
                    imageUrl = 'admin/' + imagePath;
                }
                // For just filenames, assume they're in admin/uploads/products/
                else if (imagePath.includes('product_')) {
                    imageUrl = 'admin/uploads/products/' + imagePath;
                }
                // Default fallback for other cases
                else {
                    imageUrl = 'images/' + imagePath;
                }
            }
            
            const price = parseFloat(product.price).toLocaleString('en-IN', {
                minimumFractionDigits: 0,
                maximumFractionDigits: 2
            });
            
            return `
                <div class="product card">
                    <img src="${imageUrl}" alt="${product.name}" title="${product.description || product.name}" onerror="this.src='images/placeholder.jpg'">
                    <div class="product-info">
                        <h3>${product.name}</h3>
                        <p class="product-desc">${product.description || 'High-quality baby product'}</p>
                        <p class="price">₹${price}</p>
                        <div class="btn-group">
                            <button class="add-to-cart-btn" 
                                    data-id="${product.id}" 
                                    data-name="${product.name}" 
                                    data-price="${product.price}" 
                                    data-image="${imageUrl}">Add to Cart</button>
                            <button class="btn-buy-now buy-now-btn" 
                                    data-id="${product.id}" 
                                    data-name="${product.name}" 
                                    data-price="${product.price}" 
                                    data-image="${imageUrl}">Buy Now</button>
                        </div>
                    </div>
                </div>
            `;
        }
        
        /**
         * Check if user is logged in
         */
        function isUserLoggedIn(callback) {
            fetch('auth/user_status.php', {
                method: 'GET',
                credentials: 'include'
            })
            .then(response => response.json())
            .then(data => {
                callback(data.authenticated);
            })
            .catch(error => {
                console.error('Auth check error:', error);
                callback(false);
            });
        }
        
        /**
         * Attach event listeners to cart buttons (for dynamically added elements)
         */
        function attachCartButtonListeners() {
            // Add to Cart buttons
            document.querySelectorAll('.add-to-cart-btn').forEach(btn => {
                btn.onclick = function(e) {
                    e.preventDefault();
                    
                    isUserLoggedIn(function(isLoggedIn) {
                        if (!isLoggedIn) {
                            alert('Please log in or sign up to add items to cart.');
                            window.location.href = 'login.html';
                            return;
                        }
                        
                        const productData = {
                            id: btn.dataset.id,
                            name: btn.dataset.name,
                            price: btn.dataset.price,
                            image: btn.dataset.image,
                            quantity: 1
                        };
                        
                        if (typeof addToUserCart === 'function') {
                            addToUserCart(productData.id, productData.name, productData.price, productData.image, productData.quantity);
                        } else if (typeof addToCart === 'function') {
                            addToCart(productData);
                        }
                    });
                };
            });
            
            // Buy Now buttons
            document.querySelectorAll('.buy-now-btn').forEach(btn => {
                btn.onclick = function(e) {
                    e.preventDefault();
                    
                    isUserLoggedIn(function(isLoggedIn) {
                        if (!isLoggedIn) {
                            alert('Please log in or sign up to purchase products.');
                            window.location.href = 'login.html';
                            return;
                        }
                        
                        if (typeof buyNow === 'function') {
                            buyNow(btn.dataset.id, btn.dataset.name, btn.dataset.price, btn.dataset.image);
                        }
                    });
                };
            });
        }
        
        // Load products when page loads
        document.addEventListener('DOMContentLoaded', function() {
            loadProducts();
        });
    </script>
</body>
</html>
