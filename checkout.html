<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mazhalai Mart - Checkout</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="checkout.css">
    <link rel="stylesheet" href="interactive.css">
    <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
</head>
<body>
    <div class="header">
        <div class="header-brand">
            <h1>Mazhalai Mart</h1>
            <p>Safe & Soft Products for Your Little One</p>
        </div>
        <div class="nav">
            <a href="index.html">Home</a>
            <a href="products.html">Products</a>
            <a href="cart.html">Cart</a>
            <a href="orders.html">Orders</a>
        </div>
    </div>
    <section class="checkout-page container">
        <div class="checkout-forms">
            <form id="checkout-form">
            <div class="form-section card">
                <h3>Shipping Address</h3>
                <div class="form-row">
                    <div class="form-group">
                        <label>First Name</label>
                        <input type="text" name="first_name" placeholder="Enter first name" required>
                    </div>
                    <div class="form-group">
                        <label>Last Name</label>
                        <input type="text" name="last_name" placeholder="Enter last name" required>
                    </div>
                </div>
                <div class="form-group">
                    <label>Address</label>
                    <input type="text" name="address" placeholder="House no, Street, Area" required>
                </div>
                <div class="form-row">
                    <div class="form-group">
                        <label>City</label>
                        <input type="text" name="city" placeholder="Enter city" required>
                    </div>
                    <div class="form-group">
                        <label>State</label>
                        <input type="text" name="state" placeholder="Enter state" required>
                    </div>
                </div>
                <div class="form-row">
                    <div class="form-group">
                        <label>PIN Code</label>
                        <input type="text" name="pincode" placeholder="Enter PIN code" required>
                    </div>
                    <div class="form-group">
                        <label>Phone Number</label>
                        <input type="tel" name="phone" placeholder="Enter phone number" required>
                    </div>
                </div>
                <div class="form-group">
                    <label>Email</label>
                    <input type="email" name="email" placeholder="Enter email address" required>
                </div>
            </div>
            <div class="form-section card">
                <h3>Payment Method</h3>
                <div class="payment-grid">
                    <label class="payment-option">
                        <input type="radio" name="payment" value="upi" checked>
                        <div class="payment-content">
                            <span class="payment-icon">📱</span>
                            <div>
                                <strong>UPI</strong>
                                <p>Google Pay, PhonePe, Paytm</p>
                            </div>
                        </div>
                    </label>
                    <label class="payment-option">
                        <input type="radio" name="payment" value="card">
                        <div class="payment-content">
                            <span class="payment-icon">💳</span>
                            <div>
                                <strong>Credit / Debit Card</strong>
                                <p>Visa, MasterCard, RuPay</p>
                            </div>
                        </div>
                    </label>
                    <label class="payment-option">
                        <input type="radio" name="payment" value="netbanking">
                        <div class="payment-content">
                            <span class="payment-icon">🏦</span>
                            <div>
                                <strong>Net Banking</strong>
                                <p>All major banks supported</p>
                            </div>
                        </div>
                    </label>
                    <label class="payment-option">
                        <input type="radio" name="payment" value="cod">
                        <div class="payment-content">
                            <span class="payment-icon">💵</span>
                            <div>
                                <strong>Cash on Delivery</strong>
                                <p>Pay when you receive</p>
                            </div>
                        </div>
                    </label>
                </div>
            </div>
            </form>
        </div>
        <div class="checkout-summary card">
            <!-- Dynamic content will be loaded here by JavaScript -->
        </div>
    </section>
    <div class="footer">
        <p></p>
    </div>
    <script src="js/main.js"></script>
    <script src="js/checkout.js"></script>
</body>
</html>
