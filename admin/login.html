<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Login - Mazhalai Mart</title>
    <link rel="stylesheet" href="../style.css">
    <link rel="stylesheet" href="../auth.css">
    <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
</head>
<body>
    <div class="auth-container">
        <div class="auth-card">
            <div class="auth-header">
                <h1>Mazhalai Mart</h1>
                <p>Admin Panel</p>
                <h2>Administrator Login</h2>
            </div>
            
            <form id="adminLoginForm" class="auth-form">
                <div class="form-group">
                    <label for="username">Username or Email</label>
                    <input type="text" id="username" name="username" required 
                           placeholder="Enter admin username or email">
                </div>
                
                <div class="form-group">
                    <label for="password">Password</label>
                    <input type="password" id="password" name="password" required 
                           placeholder="Enter admin password">
                </div>
                
                <div class="form-group checkbox-group">
                    <label class="checkbox-label">
                        <input type="checkbox" id="remember_me" name="remember_me">
                        <span class="checkmark"></span>
                        Remember me
                    </label>
                </div>
                
                <button type="submit" class="auth-btn" id="loginBtn">
                    <span class="btn-text">Login to Admin Panel</span>
                </button>
                
                <div id="loginMessage" class="error-message"></div>
                <div id="successMessage" class="success-message"></div>
            </form>
            
            <div class="auth-footer">
                <p><a href="../index.html">← Back to Website</a></p>
                <p style="color: #8B7355; font-size: 0.85rem; margin-top: 15px;">
                    Default credentials: <strong>admin</strong> / <strong>admin123</strong>
                </p>
            </div>
        </div>
    </div>
    
    <script>
        $(document).ready(function() {
            $('#adminLoginForm').on('submit', function(e) {
                e.preventDefault();
                
                const username = $('#username').val().trim();
                const password = $('#password').val();
                const rememberMe = $('#remember_me').is(':checked');
                
                if (!username || !password) {
                    showMessage('Please enter both username and password', 'error');
                    return;
                }
                
                // Show loading state
                showLoading();
                
                // Make login request
                $.ajax({
                    url: 'api/login.php',
                    method: 'POST',
                    contentType: 'application/json',
                    data: JSON.stringify({
                        username: username,
                        password: password,
                        remember_me: rememberMe
                    }),
                    success: function(response) {
                        if (response.success) {
                            showMessage('Login successful! Redirecting...', 'success');
                            setTimeout(function() {
                                window.location.href = 'dashboard.html';
                            }, 1000);
                        } else {
                            showMessage(response.message || 'Login failed', 'error');
                        }
                    },
                    error: function(xhr) {
                        let message = 'Login failed. Please try again.';
                        if (xhr.responseJSON && xhr.responseJSON.message) {
                            message = xhr.responseJSON.message;
                        }
                        showMessage(message, 'error');
                    },
                    complete: function() {
                        hideLoading();
                    }
                });
            });
            
            function showMessage(message, type) {
                if (type === 'success') {
                    $('#successMessage').text(message).fadeIn();
                    $('#loginMessage').hide();
                } else {
                    $('#loginMessage').text(message).fadeIn();
                    $('#successMessage').hide();
                }
            }
            
            function showLoading() {
                $('#loginBtn').prop('disabled', true).addClass('btn-loading');
                $('.btn-text').text('Logging in...');
            }
            
            function hideLoading() {
                $('#loginBtn').prop('disabled', false).removeClass('btn-loading');
                $('.btn-text').text('Login to Admin Panel');
            }
            
            // Auto-focus username field
            $('#username').focus();
            
            // Enter key navigation
            $('#username').on('keypress', function(e) {
                if (e.which === 13) {
                    $('#password').focus();
                }
            });
        });
    </script>
</body>
</html>
