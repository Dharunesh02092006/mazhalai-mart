<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard - Mazhalai Mart Admin</title>
    <link rel="stylesheet" href="../style.css">
    <link rel="stylesheet" href="admin-styles.css">
    <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
</head>
<body>
    <div class="admin-layout">
        <!-- Sidebar -->
        <div class="admin-sidebar">
            <div class="admin-sidebar-header">
                <h1>Mazhalai Mart</h1>
                <p>Admin Panel</p>
            </div>
            <nav class="admin-nav">
                <a href="dashboard.html" class="admin-nav-item active">
                    <i>📊</i> Dashboard
                </a>
                <a href="products/view_products.html" class="admin-nav-item">
                    <i>📦</i> Products
                </a>
                <a href="orders/view_orders.html" class="admin-nav-item">
                    <i>🛒</i> Orders
                </a>
                <a href="users/view_users.html" class="admin-nav-item">
                    <i>👥</i> Users
                </a>
            </nav>
        </div>
        
        <!-- Main Content -->
        <div class="admin-main">
            <header class="admin-header">
                <h1>Dashboard</h1>
                <div class="admin-user-info">
                    <div class="admin-user-details">
                        <p class="admin-user-name" id="adminName">Loading...</p>
                        <p class="admin-user-role" id="adminRole">Loading...</p>
                    </div>
                    <a href="logout.php" class="admin-logout-btn">Logout</a>
                </div>
            </header>
            
            <main class="admin-content">
                <!-- Dashboard Statistics -->
                <div class="dashboard-stats" id="dashboardStats">
                    <div class="stat-card">
                        <div class="stat-icon">📦</div>
                        <h3 class="stat-number" id="totalProducts">-</h3>
                        <p class="stat-label">Total Products</p>
                        <small class="stat-change" id="productsChange">Loading...</small>
                    </div>
                    
                    <div class="stat-card">
                        <div class="stat-icon">🛒</div>
                        <h3 class="stat-number" id="totalOrders">-</h3>
                        <p class="stat-label">Total Orders</p>
                        <small class="stat-change" id="ordersChange">Loading...</small>
                    </div>
                    
                    <div class="stat-card">
                        <div class="stat-icon">👥</div>
                        <h3 class="stat-number" id="totalUsers">-</h3>
                        <p class="stat-label">Total Users</p>
                        <small class="stat-change" id="usersChange">Loading...</small>
                    </div>
                    
                    <div class="stat-card">
                        <div class="stat-icon">💰</div>
                        <h3 class="stat-number" id="totalRevenue">-</h3>
                        <p class="stat-label">Total Revenue</p>
                        <small class="stat-change" id="revenueChange">Loading...</small>
                    </div>
                </div>
                

                
                <!-- Recent Activity -->
                <div class="dashboard-section">
                    <div class="section-header">
                        <h2 class="section-title">Recent Orders</h2>
                        <a href="orders/view_orders.html" class="view-all-btn">View All Orders</a>
                    </div>
                    <div class="recent-orders" id="recentOrders">
                        <div class="loading-message">Loading recent orders...</div>
                    </div>
                </div>
            </main>
        </div>
    </div>
    
    <script>
        $(document).ready(function() {
            // Load dashboard data
            loadDashboardData();
            loadRecentOrders();
            
            // Refresh data every 30 seconds
            setInterval(function() {
                loadDashboardData();
                loadRecentOrders();
            }, 30000);
        });
        
        function loadDashboardData() {
            $.ajax({
                url: 'api/dashboard_stats_simple.php',
                method: 'GET',
                timeout: 10000,
                success: function(response) {
                    if (response.success) {
                        updateStats(response.data);
                        updateAdminInfo(response.admin);
                    } else {
                        console.error('Dashboard API error:', response.message);
                        showDashboardError('Failed to load dashboard data: ' + response.message);
                    }
                },
                error: function(xhr, status, error) {
                    console.error('Failed to load dashboard data:', error);
                    console.error('Response:', xhr.responseText);
                    
                    if (xhr.status === 401) {
                        showAuthError();
                    } else {
                        showDashboardError('Unable to connect to server. Please check your connection.');
                    }
                }
            });
        }
        
        function updateStats(data) {
            $('#totalProducts').text(data.total_products || 0);
            $('#totalOrders').text(data.total_orders || 0);
            $('#totalUsers').text(data.total_users || 0);
            $('#totalRevenue').text('₹' + (data.total_revenue || 0).toLocaleString());
            
            // Update change indicators
            $('#productsChange').text(data.products_change || 'No change');
            $('#ordersChange').text(data.orders_change || 'No change');
            $('#usersChange').text(data.users_change || 'No change');
            $('#revenueChange').text(data.revenue_change || 'No change');
        }
        
        function updateAdminInfo(admin) {
            if (admin) {
                $('#adminName').text(admin.full_name || 'Admin');
                $('#adminRole').text(admin.role || 'Administrator');
            }
        }
        
        function loadRecentOrders() {
            $.ajax({
                url: 'api/recent_orders_simple.php',
                method: 'GET',
                timeout: 10000,
                success: function(response) {
                    if (response.success && response.orders) {
                        displayRecentOrders(response.orders);
                    } else {
                        $('#recentOrders').html('<div class="no-data">No recent orders found</div>');
                    }
                },
                error: function(xhr, status, error) {
                    console.error('Failed to load recent orders:', error);
                    if (xhr.status === 401) {
                        $('#recentOrders').html('<div class="error-message">Authentication required. Please <a href="login.html">login</a>.</div>');
                    } else {
                        $('#recentOrders').html('<div class="error-message">Failed to load recent orders. Please refresh the page.</div>');
                    }
                }
            });
        }
        
        function displayRecentOrders(orders) {
            if (orders.length === 0) {
                $('#recentOrders').html('<div class="no-data">No recent orders found</div>');
                return;
            }
            
            let html = '<div class="orders-table-container"><table class="orders-table">';
            html += '<thead><tr><th>Order ID</th><th>Customer</th><th>Amount</th><th>Status</th><th>Date</th></tr></thead><tbody>';
            
            orders.forEach(function(order) {
                html += `<tr>
                    <td><strong>${order.order_id}</strong></td>
                    <td>${order.customer_name}</td>
                    <td>₹${parseFloat(order.total_amount).toLocaleString()}</td>
                    <td><span class="status-badge status-${order.status}">${order.status}</span></td>
                    <td>${formatDate(order.created_at)}</td>
                </tr>`;
            });
            
            html += '</tbody></table></div>';
            $('#recentOrders').html(html);
        }
        
        
        function formatDate(dateString) {
            const date = new Date(dateString);
            return date.toLocaleDateString() + ' ' + date.toLocaleTimeString([], {hour: '2-digit', minute:'2-digit'});
        }
        
        function showDashboardError(message) {
            $('#totalProducts').text('Error');
            $('#totalOrders').text('Error');
            $('#totalUsers').text('Error');
            $('#totalRevenue').text('Error');
            
            $('#productsChange').text('Unable to load');
            $('#ordersChange').text('Unable to load');
            $('#usersChange').text('Unable to load');
            $('#revenueChange').text('Unable to load');
            
            $('#adminName').text('Error loading admin info');
            $('#adminRole').text('Please refresh page');
        }
        
        function showAuthError() {
            window.location.href = 'login.html';
        }
    </script>
    
    <!-- Responsive Admin JavaScript -->
    <script src="admin-responsive.js"></script>
</body>
</html>
